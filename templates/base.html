<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>CBTis 204 | Tlalpujahua</title>
</head>
<body class="bg-gray-50">
    <nav class="bg-black text-white p-6 border-b-2 border-red-900">
        <div class="container mx-auto flex justify-between items-center">
            
            <!-- Logo y nombre sustituidos por la imagen del logo -->
            <a href="/" class="flex items-center gap-3">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo CBTis 204" class="h-12 w-auto">
                <span class="text-2xl font-black italic text-red-600">CBTis 204</span>
            </a>

            <!-- Menú de navegación -->
            <div class="space-x-6 text-xs font-bold uppercase tracking-widest">
                <a href="/acerca-de" class="hover:text-red-500 transition-colors">Nosotros</a>
                <a href="/oferta-educativa" class="hover:text-red-500 transition-colors">Oferta educativa</a>
                <a href="/inscripcion" class="hover:text-red-500 transition-colors">Inscripción</a>
                <a href="/contacto" class="hover:text-red-500 transition-colors">Contacto</a>
                <a href="/aviso-privacidad" class="hover:text-red-500 transition-colors">Aviso</a>
            </div>
        </div>
    </nav>
    <main class="container mx-auto py-10">{% block content %}{% endblock %}</main>
</body>
</html>
