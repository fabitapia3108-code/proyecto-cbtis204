{% extends 'base.html' %}
{% block content %}
<div class="max-w-6xl mx-auto animar-entrada p-6">
    <div class="text-center mb-16">
        <h1 class="text-5xl font-black uppercase text-red-900 mb-4">Contacto</h1>
        <div class="w-32 h-2 bg-red-600 mx-auto rounded-full"></div>
    </div>

    <div class="grid md:grid-cols-2 gap-12">
        <!-- Columna de Información -->
        <div class="space-y-8">
            <!-- Tarjeta Informativa similar a image_583e67.png -->
            <div class="bg-white p-8 rounded-3xl shadow-xl border-l-8 border-red-900">
                <h2 class="text-2xl font-black mb-6">Información Directa</h2>
                <div class="space-y-6">
                    <p class="flex items-center gap-4 text-lg font-bold"><span>📞</span> 711 158 0213</p>
                    <p class="flex items-start gap-4 text-lg font-bold">
                        <span>📍</span> Km 39, Carr. Maravatio-Tlalpujahua, Tlalpujahua de Rayón, México, C.P. 61060
                    </p>
                    <a href="https://www.facebook.com/Cbtis204" target="_blank" class="flex items-center gap-4 text-red-800 font-bold hover:underline">
                        <span>🌐</span> Facebook: CBTIS No. 204
                    </a>
                </div>
            </div>

            <!-- Mapa (Placeholder o iframe) -->
            <div class="h-64 bg-gray-200 rounded-3xl overflow-hidden shadow-xl">
                <iframe class="w-full h-full" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3753.111956557876!2d-100.228123!3d19.790938!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x85d326f592476569%3A0x6a0d4c9d5351e289!2sCBTis+204!5e0!3m2!1ses!2smx!4v1684345233215!5m2!1ses!2smx" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </div>

        <!-- Columna del Formulario -->
        <div class="bg-black text-white p-8 rounded-3xl shadow-2xl">
            <h2 class="text-3xl font-black mb-6 uppercase">ENVÍANOS UN MENSAJE</h2>
            <form class="space-y-4">
                <input type="text" placeholder="Nombre" class="w-full p-4 rounded-xl bg-gray-800 border border-gray-700">
                <textarea placeholder="¿En qué te ayudamos?" rows="6" class="w-full p-4 rounded-xl bg-gray-800 border border-gray-700"></textarea>
                <button type="button" class="w-full py-4 bg-red-700 hover:bg-red-800 font-black rounded-xl uppercase transition">ENVIAR</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
