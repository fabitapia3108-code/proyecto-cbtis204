{% extends 'base.html' %}

{% block content %}
<div class="max-w-6xl mx-auto animar-entrada p-6">
    <!-- Encabezado -->
    <div class="text-center mb-16">
        <h1 class="text-5xl font-black uppercase text-red-900 mb-4">Contacto</h1>
        <div class="w-32 h-2 bg-red-600 mx-auto rounded-full"></div>
    </div>

    <div class="grid md:grid-cols-2 gap-12">
        <!-- Columna de Información -->
        <div class="space-y-8">
            <!-- Tarjeta Informativa -->
            <div class="bg-white p-8 rounded-3xl shadow-xl border-l-8 border-red-900">
                <h2 class="text-2xl font-black mb-6 uppercase">Información Directa</h2>
                <div class="space-y-6">
                    <!-- Teléfono -->
                    <div class="flex items-center gap-4 text-lg font-bold">
                        <svg class="w-6 h-6 text-red-900" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
                        <span>711 158 0213</span>
                    </div>
                    <!-- Dirección -->
                    <div class="flex items-start gap-4 text-lg font-bold">
                        <svg class="w-6 h-6 text-red-900 mt-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        <span>Michoacán Maravatío de Ocampo - Tlalpujahua 5950, 61060 Tlalpujahua de Rayón, Mich.</span>
                    </div>
                    <!-- Facebook -->
                    <a href="https://www.facebook.com/Cbtis204" target="_blank" class="flex items-center gap-4 text-red-800 font-bold hover:underline">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874V12h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                        <span>Facebook: CBTIS No. 204</span>
                    </a>
                </div>
            </div>

            <!-- Mapa -->
            <div class="h-64 rounded-3xl overflow-hidden shadow-xl border-4 border-white">
                <iframe 
                    class="w-full h-full" 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3753.056!2d-100.228!3d19.791!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x85d326f592476569%3A0x6a0d4c9d5351e289!2sCBTis+204!5e0!3m2!1ses!2smx!4v1718491866405!5m2!1ses!2smx" 
                    allowfullscreen="" 
                    loading="lazy">
                </iframe>
            </div>
        </div>

        <!-- Columna del Formulario -->
        <div class="bg-black text-white p-8 rounded-3xl shadow-2xl">
            <h2 class="text-3xl font-black mb-6 uppercase text-center">Envíanos un mensaje</h2>
            <form class="space-y-4">
                <input type="text" placeholder="Nombre completo" class="w-full p-4 rounded-xl bg-gray-800 border border-gray-700 text-white placeholder-gray-400 focus:border-red-600 outline-none">
                <textarea placeholder="¿En qué te ayudamos?" rows="6" class="w-full p-4 rounded-xl bg-gray-800 border border-gray-700 text-white placeholder-gray-400 focus:border-red-600 outline-none"></textarea>
                <button type="button" class="w-full py-4 bg-red-700 hover:bg-red-800 font-black rounded-xl uppercase transition transform hover:scale-[1.02]">Enviar mensaje</button>
            </form>
        </div>
    </div>
</div>

<style>
    @keyframes fadeInUp {
        0% { opacity: 0; transform: translateY(30px); }
        100% { opacity: 1; transform: translateY(0); }
    }
    .animar-entrada { animation: fadeInUp 1s ease-out forwards; }
</style>
{% endblock %}
